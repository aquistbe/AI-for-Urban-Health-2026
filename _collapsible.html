<script>
// Makes activity / scenario / challenge / bonus-exercise blocks collapsible.
// Collapsed by default EXCEPT the first activity/exercise on a page (kept open so
// the page doesn't look empty). The title, meta line, and one-line Goal teaser stay
// visible while collapsed. Robust to Quarto wrapping each heading in its own <section>.
(function () {
  var SEL = "div.activity, div.scenario-card, div.challenge-card, div.challenge-exercise";
  function isMeta(el) {
    return el && el.classList &&
      (el.classList.contains("activity-meta") || el.classList.contains("challenge-meta"));
  }
  function isGoalPara(el) {
    return el && el.tagName === "P" && /^goal\b/i.test((el.textContent || "").trim());
  }
  function moveSiblingsInto(startNode, container) {
    var n = startNode.nextSibling;
    while (n) { var next = n.nextSibling; container.appendChild(n); n = next; }
  }
  function initBox(box) {
    if (box.dataset.collapsibleInit) return;
    var h = box.querySelector("h2, h3, h4, h5, h6");
    if (!h) return;
    box.dataset.collapsibleInit = "1";

    // `top` = direct child of box containing the heading (heading itself, or its <section>)
    var top = h;
    while (top.parentElement && top.parentElement !== box) top = top.parentElement;

    // visible prefix while collapsed: heading + optional meta + optional one-line Goal
    var visibleEnd = h;
    if (isMeta(visibleEnd.nextElementSibling)) visibleEnd = visibleEnd.nextElementSibling;
    if (isGoalPara(visibleEnd.nextElementSibling)) {
      visibleEnd = visibleEnd.nextElementSibling;
      visibleEnd.classList.add("collapsible-teaser");
    }

    var bodyA = document.createElement("div");
    bodyA.className = "collapsible-body";
    moveSiblingsInto(visibleEnd, bodyA);
    (top === h ? box : top).appendChild(bodyA);

    if (top !== h) {
      var bodyB = document.createElement("div");
      bodyB.className = "collapsible-body";
      moveSiblingsInto(top, bodyB);
      box.appendChild(bodyB);
    }

    var arrow = document.createElement("span");
    arrow.className = "collapsible-arrow";
    arrow.setAttribute("aria-hidden", "true");
    arrow.textContent = "▸ "; // ▸
    h.insertBefore(arrow, h.firstChild);
    h.classList.add("collapsible-toggle");
    h.style.cursor = "pointer";

    box.classList.add("collapsible-collapsed");
    h.addEventListener("click", function () {
      var collapsed = box.classList.toggle("collapsible-collapsed");
      arrow.textContent = collapsed ? "▸ " : "▾ "; // ▸ / ▾
    });
  }
  function setOpen(box) {
    box.classList.remove("collapsible-collapsed");
    var arrow = box.querySelector(".collapsible-arrow");
    if (arrow) arrow.textContent = "▾ "; // ▾
  }
  function expandForHash() {
    if (!location.hash) return;
    var el;
    try { el = document.getElementById(decodeURIComponent(location.hash.slice(1))); }
    catch (e) { el = null; }
    if (!el) return;
    var box = el.closest ? el.closest(SEL) : null;
    if (box && box.classList.contains("collapsible-collapsed")) setOpen(box);
    if (el.scrollIntoView) el.scrollIntoView();
  }
  function run() {
    var boxes = document.querySelectorAll(SEL);
    var keptOpen = false;
    boxes.forEach(function (box) {
      initBox(box);
      // keep the first activity (day pages) or first exercise (challenges page) expanded
      if (!keptOpen &&
          (box.classList.contains("activity") || box.classList.contains("challenge-exercise"))) {
        setOpen(box);
        keptOpen = true;
      }
    });
    expandForHash();
    window.addEventListener("hashchange", expandForHash);
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", run);
  } else { run(); }
})();
</script>
